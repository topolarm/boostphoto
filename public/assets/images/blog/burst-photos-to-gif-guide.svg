<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4338ca" />
      <stop offset="100%" style="stop-color:#7c3aed" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Decorative elements -->
  <circle cx="950" cy="120" r="180" fill="rgba(255,255,255,0.04)" />
  <circle cx="1000" cy="80" r="120" fill="rgba(255,255,255,0.03)" />
  <circle cx="200" cy="500" r="250" fill="rgba(255,255,255,0.03)" />

  <!-- Decorative lines -->
  <line x1="80" y1="180" x2="200" y2="180" stroke="rgba(255,255,255,0.2)" stroke-width="3" />
  <line x1="80" y1="195" x2="140" y2="195" stroke="rgba(255,255,255,0.12)" stroke-width="2" />

  <!-- Film strip / burst icon decoration -->
  <rect x="900" y="380" width="50" height="40" rx="4" fill="rgba(255,255,255,0.08)" />
  <rect x="960" y="370" width="50" height="40" rx="4" fill="rgba(255,255,255,0.1)" />
  <rect x="1020" y="360" width="50" height="40" rx="4" fill="rgba(255,255,255,0.12)" />

  <!-- Small dots pattern -->
  <circle cx="100" cy="100" r="3" fill="rgba(255,255,255,0.1)" />
  <circle cx="130" cy="100" r="3" fill="rgba(255,255,255,0.1)" />
  <circle cx="160" cy="100" r="3" fill="rgba(255,255,255,0.1)" />
  <circle cx="100" cy="130" r="3" fill="rgba(255,255,255,0.1)" />
  <circle cx="130" cy="130" r="3" fill="rgba(255,255,255,0.1)" />
  <circle cx="160" cy="130" r="3" fill="rgba(255,255,255,0.1)" />

  <!-- Title text -->
  <text x="600" y="250" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="52" fill="white" letter-spacing="-0.5">
    <tspan x="600" dy="0">Burst to GIF: The Complete</tspan>
    <tspan x="600" dy="68">Guide to Turning Burst Photos</tspan>
    <tspan x="600" dy="68">into Smooth Animations</tspan>
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.2)" />

  <!-- boost.photo branding -->
  <text x="1160" y="610" text-anchor="end" font-family="Inter, sans-serif" font-weight="500" font-size="18" fill="rgba(255,255,255,0.6)">boost.photo</text>

  <!-- Category pill -->
  <rect x="530" y="145" width="140" height="32" rx="16" fill="rgba(255,255,255,0.15)" />
  <text x="600" y="167" text-anchor="middle" font-family="Inter, sans-serif" font-weight="500" font-size="14" fill="rgba(255,255,255,0.85)" letter-spacing="1">TUTORIAL</text>
</svg>