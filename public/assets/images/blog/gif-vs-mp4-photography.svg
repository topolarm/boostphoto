<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f766e" />
      <stop offset="100%" style="stop-color:#059669" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Decorative elements -->
  <circle cx="1050" cy="130" r="180" fill="rgba(255,255,255,0.04)" />
  <circle cx="150" cy="500" r="220" fill="rgba(255,255,255,0.03)" />

  <!-- VS decoration -->
  <circle cx="600" cy="460" r="35" fill="rgba(255,255,255,0.08)" />
  <text x="600" y="470" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="22" fill="rgba(255,255,255,0.15)">VS</text>

  <!-- GIF box -->
  <rect x="380" y="410" width="120" height="50" rx="8" fill="rgba(255,255,255,0.08)" />
  <text x="440" y="442" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="18" fill="rgba(255,255,255,0.2)">.GIF</text>

  <!-- MP4 box -->
  <rect x="700" y="410" width="120" height="50" rx="8" fill="rgba(255,255,255,0.08)" />
  <text x="760" y="442" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="18" fill="rgba(255,255,255,0.2)">.MP4</text>

  <!-- Decorative lines -->
  <line x1="80" y1="180" x2="200" y2="180" stroke="rgba(255,255,255,0.2)" stroke-width="3" />
  <line x1="80" y1="195" x2="140" y2="195" stroke="rgba(255,255,255,0.12)" stroke-width="2" />

  <!-- Abstract comparison arrows -->
  <line x1="500" y1="435" x2="560" y2="435" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
  <line x1="640" y1="435" x2="700" y2="435" stroke="rgba(255,255,255,0.1)" stroke-width="2" />

  <!-- Dots -->
  <circle cx="100" cy="100" r="3" fill="rgba(255,255,255,0.1)" />
  <circle cx="130" cy="100" r="3" fill="rgba(255,255,255,0.1)" />
  <circle cx="160" cy="100" r="3" fill="rgba(255,255,255,0.1)" />
  <circle cx="100" cy="130" r="3" fill="rgba(255,255,255,0.1)" />

  <!-- Category pill -->
  <rect x="520" y="140" width="160" height="32" rx="16" fill="rgba(255,255,255,0.15)" />
  <text x="600" y="162" text-anchor="middle" font-family="Inter, sans-serif" font-weight="500" font-size="14" fill="rgba(255,255,255,0.85)" letter-spacing="1">COMPARISON</text>

  <!-- Title text -->
  <text x="600" y="250" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="52" fill="white" letter-spacing="-0.5">
    <tspan x="600" dy="0">GIF vs MP4 for Photography:</tspan>
    <tspan x="600" dy="68">Which Format Should</tspan>
    <tspan x="600" dy="68">You Deliver?</tspan>
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.2)" />

  <!-- boost.photo branding -->
  <text x="1160" y="610" text-anchor="end" font-family="Inter, sans-serif" font-weight="500" font-size="18" fill="rgba(255,255,255,0.6)">boost.photo</text>
</svg>