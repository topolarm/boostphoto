<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#be185d" />
      <stop offset="100%" style="stop-color:#ec4899" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Decorative elements -->
  <circle cx="1000" cy="120" r="180" fill="rgba(255,255,255,0.04)" />
  <circle cx="200" cy="520" r="220" fill="rgba(255,255,255,0.03)" />

  <!-- Gallery frame decorations -->
  <rect x="880" y="340" width="90" height="70" rx="4" fill="rgba(255,255,255,0.08)" />
  <rect x="985" y="330" width="90" height="70" rx="4" fill="rgba(255,255,255,0.06)" />
  <rect x="1090" y="340" width="70" height="70" rx="4" fill="rgba(255,255,255,0.05)" />
  <rect x="880" y="425" width="70" height="55" rx="4" fill="rgba(255,255,255,0.05)" />
  <rect x="965" y="415" width="90" height="55" rx="4" fill="rgba(255,255,255,0.07)" />

  <!-- Heart decoration -->
  <path d="M130 430 C130 415, 150 405, 155 420 C160 405, 180 415, 180 430 C180 450, 155 465, 155 465 C155 465, 130 450, 130 430Z" fill="rgba(255,255,255,0.08)" />

  <!-- Decorative lines -->
  <line x1="80" y1="180" x2="200" y2="180" stroke="rgba(255,255,255,0.2)" stroke-width="3" />
  <line x1="80" y1="195" x2="140" y2="195" stroke="rgba(255,255,255,0.12)" stroke-width="2" />

  <!-- Small dots -->
  <circle cx="100" cy="100" r="3" fill="rgba(255,255,255,0.1)" />
  <circle cx="130" cy="100" r="3" fill="rgba(255,255,255,0.1)" />
  <circle cx="160" cy="100" r="3" fill="rgba(255,255,255,0.1)" />

  <!-- Category pill -->
  <rect x="535" y="135" width="130" height="32" rx="16" fill="rgba(255,255,255,0.15)" />
  <text x="600" y="157" text-anchor="middle" font-family="Inter, sans-serif" font-weight="500" font-size="14" fill="rgba(255,255,255,0.85)" letter-spacing="1">WEDDING</text>

  <!-- Title text -->
  <text x="600" y="240" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="46" fill="white" letter-spacing="-0.5">
    <tspan x="600" dy="0">How to Deliver GIFs in Your</tspan>
    <tspan x="600" dy="62">Pic-Time and Pixieset</tspan>
    <tspan x="600" dy="62">Wedding Gallery</tspan>
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.2)" />

  <!-- boost.photo branding -->
  <text x="1160" y="610" text-anchor="end" font-family="Inter, sans-serif" font-weight="500" font-size="18" fill="rgba(255,255,255,0.6)">boost.photo</text>
</svg>