<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c2410c" />
      <stop offset="100%" style="stop-color:#d97706" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Decorative elements -->
  <circle cx="1000" cy="140" r="180" fill="rgba(255,255,255,0.04)" />
  <circle cx="200" cy="500" r="230" fill="rgba(255,255,255,0.03)" />

  <!-- Old way icon (clock/hourglass) -->
  <rect x="160" y="380" width="80" height="100" rx="6" fill="rgba(255,255,255,0.06)" />
  <line x1="180" y1="400" x2="220" y2="400" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
  <line x1="185" y1="460" x2="215" y2="460" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
  <line x1="200" y1="400" x2="200" y2="460" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" />

  <!-- Arrow from old to new -->
  <line x1="280" y1="430" x2="360" y2="430" stroke="rgba(255,255,255,0.12)" stroke-width="3" />
  <polygon points="360,420 380,430 360,440" fill="rgba(255,255,255,0.12)" />

  <!-- New way icon (lightning bolt) -->
  <rect x="400" y="380" width="80" height="100" rx="6" fill="rgba(255,255,255,0.08)" />
  <path d="M430 395 L420 430 L435 430 L425 465" stroke="rgba(255,255,255,0.15)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Decorative lines -->
  <line x1="80" y1="180" x2="200" y2="180" stroke="rgba(255,255,255,0.2)" stroke-width="3" />
  <line x1="80" y1="195" x2="140" y2="195" stroke="rgba(255,255,255,0.12)" stroke-width="2" />

  <!-- Year badge -->
  <rect x="950" y="400" width="100" height="40" rx="20" fill="rgba(255,255,255,0.1)" />
  <text x="1000" y="426" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="18" fill="rgba(255,255,255,0.25)">2025</text>

  <!-- Dots -->
  <circle cx="100" cy="100" r="3" fill="rgba(255,255,255,0.1)" />
  <circle cx="130" cy="100" r="3" fill="rgba(255,255,255,0.1)" />
  <circle cx="160" cy="100" r="3" fill="rgba(255,255,255,0.1)" />

  <!-- Category pill -->
  <rect x="530" y="140" width="140" height="32" rx="16" fill="rgba(255,255,255,0.15)" />
  <text x="600" y="162" text-anchor="middle" font-family="Inter, sans-serif" font-weight="500" font-size="14" fill="rgba(255,255,255,0.85)" letter-spacing="1">WORKFLOW</text>

  <!-- Title text -->
  <text x="600" y="250" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="50" fill="white" letter-spacing="-0.5">
    <tspan x="600" dy="0">The Old Way vs The New Way:</tspan>
    <tspan x="600" dy="66">Making GIFs from</tspan>
    <tspan x="600" dy="66">Photos in 2025</tspan>
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.2)" />

  <!-- boost.photo branding -->
  <text x="1160" y="610" text-anchor="end" font-family="Inter, sans-serif" font-weight="500" font-size="18" fill="rgba(255,255,255,0.6)">boost.photo</text>
</svg>