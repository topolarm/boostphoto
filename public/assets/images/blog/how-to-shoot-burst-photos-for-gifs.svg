<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed" />
      <stop offset="100%" style="stop-color:#9333ea" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Decorative elements -->
  <circle cx="1000" cy="130" r="180" fill="rgba(255,255,255,0.04)" />
  <circle cx="180" cy="500" r="220" fill="rgba(255,255,255,0.03)" />

  <!-- Camera lens decoration -->
  <circle cx="980" cy="400" r="55" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="3" />
  <circle cx="980" cy="400" r="40" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2" />
  <circle cx="980" cy="400" r="25" fill="rgba(255,255,255,0.05)" />
  <circle cx="970" cy="390" r="8" fill="rgba(255,255,255,0.08)" />

  <!-- Burst sequence frames -->
  <rect x="100" y="370" width="50" height="38" rx="3" fill="rgba(255,255,255,0.05)" transform="rotate(-5, 125, 389)" />
  <rect x="115" y="365" width="50" height="38" rx="3" fill="rgba(255,255,255,0.07)" transform="rotate(-2, 140, 384)" />
  <rect x="130" y="360" width="50" height="38" rx="3" fill="rgba(255,255,255,0.09)" />
  <rect x="145" y="355" width="50" height="38" rx="3" fill="rgba(255,255,255,0.11)" transform="rotate(2, 170, 374)" />
  <rect x="160" y="350" width="50" height="38" rx="3" fill="rgba(255,255,255,0.13)" transform="rotate(4, 185, 369)" />

  <!-- Shutter speed text decoration -->
  <text x="140" y="430" font-family="Inter, sans-serif" font-weight="400" font-size="14" fill="rgba(255,255,255,0.1)">1/1000s</text>

  <!-- Decorative lines -->
  <line x1="80" y1="180" x2="200" y2="180" stroke="rgba(255,255,255,0.2)" stroke-width="3" />
  <line x1="80" y1="195" x2="140" y2="195" stroke="rgba(255,255,255,0.12)" stroke-width="2" />

  <!-- Dots -->
  <circle cx="100" cy="100" r="3" fill="rgba(255,255,255,0.1)" />
  <circle cx="130" cy="100" r="3" fill="rgba(255,255,255,0.1)" />
  <circle cx="160" cy="100" r="3" fill="rgba(255,255,255,0.1)" />
  <circle cx="100" cy="130" r="3" fill="rgba(255,255,255,0.1)" />

  <!-- Category pill -->
  <rect x="530" y="145" width="140" height="32" rx="16" fill="rgba(255,255,255,0.15)" />
  <text x="600" y="167" text-anchor="middle" font-family="Inter, sans-serif" font-weight="500" font-size="14" fill="rgba(255,255,255,0.85)" letter-spacing="1">TUTORIAL</text>

  <!-- Title text -->
  <text x="600" y="260" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="56" fill="white" letter-spacing="-0.5">
    <tspan x="600" dy="0">How to Shoot Burst Photos</tspan>
    <tspan x="600" dy="72">for Perfect GIFs</tspan>
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.2)" />

  <!-- boost.photo branding -->
  <text x="1160" y="610" text-anchor="end" font-family="Inter, sans-serif" font-weight="500" font-size="18" fill="rgba(255,255,255,0.6)">boost.photo</text>
</svg>