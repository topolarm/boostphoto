<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#3730a3" />

  <!-- Subtle grid pattern -->
  <rect width="1200" height="630" fill="url(#grid)" />

  <!-- Decorative elements -->
  <circle cx="1000" cy="100" r="160" fill="rgba(255,255,255,0.03)" />
  <circle cx="180" cy="520" r="200" fill="rgba(255,255,255,0.03)" />

  <!-- Lightroom-like panel decoration -->
  <rect x="920" y="350" width="200" height="160" rx="8" fill="rgba(255,255,255,0.06)" />
  <rect x="935" y="370" width="170" height="8" rx="4" fill="rgba(255,255,255,0.1)" />
  <rect x="935" y="390" width="120" height="8" rx="4" fill="rgba(255,255,255,0.08)" />
  <rect x="935" y="410" width="150" height="8" rx="4" fill="rgba(255,255,255,0.09)" />
  <rect x="935" y="430" width="90" height="8" rx="4" fill="rgba(255,255,255,0.07)" />
  <rect x="935" y="450" width="140" height="8" rx="4" fill="rgba(255,255,255,0.08)" />
  <rect x="935" y="470" width="110" height="8" rx="4" fill="rgba(255,255,255,0.06)" />

  <!-- Decorative lines -->
  <line x1="80" y1="180" x2="200" y2="180" stroke="rgba(255,255,255,0.2)" stroke-width="3" />
  <line x1="80" y1="195" x2="140" y2="195" stroke="rgba(255,255,255,0.12)" stroke-width="2" />

  <!-- Diamond decorations -->
  <rect x="100" y="400" width="20" height="20" fill="rgba(255,255,255,0.06)" transform="rotate(45, 110, 410)" />
  <rect x="150" y="430" width="15" height="15" fill="rgba(255,255,255,0.05)" transform="rotate(45, 157, 437)" />

  <!-- Category pill -->
  <rect x="530" y="140" width="140" height="32" rx="16" fill="rgba(255,255,255,0.15)" />
  <text x="600" y="162" text-anchor="middle" font-family="Inter, sans-serif" font-weight="500" font-size="14" fill="rgba(255,255,255,0.85)" letter-spacing="1">LIGHTROOM</text>

  <!-- Title text -->
  <text x="600" y="250" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="50" fill="white" letter-spacing="-0.5">
    <tspan x="600" dy="0">How to Make a GIF in Lightroom</tspan>
    <tspan x="600" dy="66">(Yes, It's Actually</tspan>
    <tspan x="600" dy="66">Possible Now)</tspan>
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.2)" />

  <!-- boost.photo branding -->
  <text x="1160" y="610" text-anchor="end" font-family="Inter, sans-serif" font-weight="500" font-size="18" fill="rgba(255,255,255,0.6)">boost.photo</text>
</svg>